<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="{{ .Permalink }}">
    <style>
        :root{--bg:#08080c;--surface:#111116;--border:#25252d;--fg:#fafafa;--fg3:#a1a1aa;--accent:#ec4899}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg3);padding:80px 24px;text-align:center}
        h1{font-size:1.5rem;color:var(--fg);margin-bottom:12px}
        a{color:var(--accent);text-decoration:none}
        .container{max-width:720px;margin:20px auto;text-align:left}
        .term-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px}
        .term-list a{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:.84rem;color:var(--fg3)}
        .term-list a:hover{border-color:var(--accent);color:var(--fg)}
    </style>
</head>
<body>
<h1>{{ .Title }}</h1>
<div class="term-list">
{{ range .Pages }}<a href="{{ .RelPermalink }}">{{ .Title }}</a>{{ end }}
</div>
</body>
</html>
