<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="{{ .Permalink }}">
    <style>
        :root{--bg:#08080c;--surface:#111116;--border:#25252d;--fg:#fafafa;--fg3:#a1a1aa;--accent:#ec4899;--r2:12px}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg3);padding:80px 24px}
        .container{max-width:720px;margin:0 auto}
        h1{font-size:1.5rem;color:var(--fg);margin-bottom:24px;text-align:center}
        a{color:var(--accent);text-decoration:none}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;margin-bottom:10px}
        .card h2{font-size:1rem;color:var(--fg);margin-bottom:4px}
        .card p{font-size:.8rem;color:var(--fg3)}
        .back{text-align:center;margin-top:32px}
    </style>
</head>
<body>
<div class="container">
<h1>{{ .Title }}</h1>
{{ range .Pages }}
<div class="card">
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p>{{ .Description | default .Summary | truncate 120 }}</p>
</div>
{{ end }}
<div class="back"><a href="/">← На главную</a></div>
</div>
</body>
</html>
